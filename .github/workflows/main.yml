name: Release CI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release version from tag
        run: echo "LIB_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - uses: actions/cache@v4
        with:
          path: |
            ./.gradle/
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.konan/
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle

      - name: Build with Gradle
        run: ./gradlew build -PlibVersion=$LIB_VERSION

      - name: Publish libs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Package
          path: lib/build/libs

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release version from tag
        run: echo "LIB_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - uses: actions/cache@v4
        with:
          path: |
            ./.gradle/
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.konan/
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle

      - name: Run tests with Gradle
        run: ./gradlew :lib:allTests -PlibVersion=$LIB_VERSION

      - name: Upload Unit Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Unit Test Results
          path: lib/build/test-results/**/*.xml

  publish-maven-central:
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release version from tag
        run: echo "LIB_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - uses: actions/cache@v4
        with:
          path: |
            ./.gradle/
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.konan/
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle

      - name: Import GPG Key
        run: |
          echo '${{ secrets.GPG_SIGNING_KEY }}' | base64 -d > publish_key.gpg
          gpg --quiet --batch --yes --decrypt --passphrase="${{ secrets.SECRET_PASSPHRASE }}" \
            --output $GITHUB_WORKSPACE/release.gpg publish_key.gpg

      - name: Publish to Maven Central
        run: |
          ./gradlew :lib:publishAndReleaseToMavenCentral \
            -PlibVersion=$LIB_VERSION \
            -Psigning.secretKeyRingFile=$GITHUB_WORKSPACE/release.gpg \
            -Psigning.password=${{ secrets.GPG_PASSWORD }} \
            -Psigning.keyId=${{ secrets.GPG_KEY_ID }} \
            -PmavenCentralUsername=${{ secrets.OSSRH_USERNAME }} \
            -PmavenCentralPassword=${{ secrets.OSSRH_PASSWORD }}
        env:
          GPG_PASSWORD: ${{ secrets.GPG_PASSWORD }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}

  publish-test-results:
    name: Publish Unit Tests Results
    needs: test
    runs-on: ubuntu-latest
    if: always()
    permissions:
      checks: write
      contents: read
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Publish Unit Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2.20.0
        with:
          files: artifacts/**/*.xml
